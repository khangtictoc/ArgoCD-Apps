apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboard
  namespace: argocd-apps
spec:
  project: default
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: grafana
      targetRevision: 11.1.8
      helm:
        valueFiles:
          - $values/argocd_values/grafana-dashboard/values.yaml
    - repoURL: "https://github.com/khangtictoc/ArgoCD-Apps.git"
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
