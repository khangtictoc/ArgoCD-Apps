apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: static-auth-grafana-dashboard
  namespace: grafana-dashboard
spec:
  namespace: admin
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: grafana-dashboard
    serviceAccount: grafana-dashboard
    audiences:
      - vault

---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-kv-grafana-dashboard
  namespace: grafana-dashboard
spec:
  namespace: admin
  refreshAfter: 30s

  type: kv-v2
  mount: aws
  path: k8s/oss/ci/grafana-dashboard
  destination:
    name: grafana-dashboard-creds
    create: true
  vaultAuthRef: static-auth-grafana-dashboard
